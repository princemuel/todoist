# Production configuration - production overrides only
# These override values from Config.toml

debug = false

[auth]
jwt_expiry_secs = 900  # Shorter expiry in production (15 minutes)

[database]
require_ssl             = true  # Enforce SSL in production
pool_min_connections    = 2
pool_max_connections    = 20  # Higher for production throughput
pool_acquire_timeout_ms = 3_000

[server]
timeout = 15
# base_url: Set via APP_SERVER__BASE_URL (e.g., https://api.yourdomain.com)
