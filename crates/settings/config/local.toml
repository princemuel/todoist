# Development configuration - local overrides only
# These override values from Config.toml

debug = true

[auth]
jwt_expiry_secs = 86400  # 24 hours for development convenience

[database]
name                 = "todoist_dev"
pool_idle_timeout_ms = 600_000  # Longer timeout in dev

[server]
timeout  = 30  # Longer timeout for debugging
base_url = "http://localhost:8080"
