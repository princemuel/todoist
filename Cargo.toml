[workspace]
members = ["crates/core", "crates/dal", "crates/glue", "crates/network/*"]
resolver = "3"
# default-members = ["web"]

[workspace.lints.rust]
elided-lifetimes-in-paths = "warn"

[workspace.lints.clippy]
many_single_char_names = "allow"
unwrap_or_default = "allow"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
repository = "https://github.com/princemuel/todoist"

[workspace.dependencies]
clap = "4"
# colored    = "3"
# rand       = "0.9"
serde = "1"
serde_json = "1"
tokio = "1"

################
dal = { path = "crates/dal" }
engine = { path = "crates/core" }
glue = { path = "crates/glue" }

[profile.release]
opt-level = "s"
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true
