[workspace]
members = ["crates/services/*", "crates/shared", "crates/network/*"]
resolver = "3"
# default-members = ["web"]

[workspace.lints.rust]
elided-lifetimes-in-paths = "warn"

[workspace.lints.clippy]
pedantic = "warn"
ptr_arg = "warn"
use_self = "warn"
suspicious = "warn"
perf = "warn"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false
repository = "https://github.com/princemuel/todoist"

[workspace.dependencies]
tokio = "1"
########################
actix-web = "4"
axum = { version = "0.8" }
hyper = "1"
http-body-util = "0.1"
hyper-util = "0.1"
rocket = "0.5"
#########################
clap = "4"
# colored    = "3"
# rand       = "0.9"
serde = "1"
serde_json = "1"

#########################
dal = { path = "crates/services/dal" }
engine = { path = "crates/services/core" }
shared = { path = "crates/shared" }

[profile.release]
opt-level = "s"
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true
