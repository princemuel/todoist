default_job = "dev"

[jobs]

[jobs.dev]
background = false
command = ["cargo", "run", "-p", "web"] # ["cargo", "run", "--", "--serve"]
watch = ["src", "Cargo.toml"]
kill = ["kill", "-s", "INT"]
need_stdout = true
on_change_strategy = "kill_then_restart"
allow_warnings = true

[jobs.start]
command = ["cargo", "run"]
need_stdout = true
watch = ["src", "Cargo.toml"]

[jobs.test]
command = ["cargo", "test"]
need_stdout = true
watch = ["src", "tests"]

[jobs.lint]
command = [
  "cargo",
  "clippy",
  "--all-targets",
  "--all-features",
  "--",
  "-D",
  "warnings",
  "-W",
  "clippy::pedantic",
]
listen = true
need_stdout = false
watch = ["src", "Cargo.toml"]

[jobs.fmt]
command = ["cargo", "fmt", "--all", "--", "--check"]
need_stdout = true
watch = ["src"]

[jobs.build]
command = ["cargo", "build", "--release"]
need_stdout = true
watch = ["src", "Cargo.toml"]

[jobs.ci]
command = [
  "bash",
  "-c",
  "cargo fmt --all -- --check && cargo clippy --all-targets --all-features -- -D warnings && cargo test",
]
need_stdout = true
watch = ["src", "tests", "Cargo.toml"]
